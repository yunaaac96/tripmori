<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>TripMori 旅行手帳</title>
    <meta name="description" content="團體旅遊規劃手帳" />
    <meta name="application-name" content="TripMori" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TripMori" />

    <!-- Open Graph (分享縮圖) -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://tripmori.vercel.app/" />
    <meta property="og:title"       content="TripMori 旅行手帳" />
    <meta property="og:description" content="團體旅遊規劃手帳，記錄行程、日誌與旅費" />
    <meta property="og:image"       content="https://tripmori.vercel.app/icons/icon-512-light.png" />
    <meta property="og:image:width"  content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="TripMori 旅行手帳" />
    <meta name="twitter:description" content="團體旅遊規劃手帳，記錄行程、日誌與旅費" />
    <meta name="twitter:image"       content="https://tripmori.vercel.app/icons/icon-512-light.png" />

    <!-- theme-color: light / dark auto-switch -->
    <meta name="theme-color" content="#F7F4EB" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#3A5A3A" media="(prefers-color-scheme: dark)" />

    <!-- Inline splash: renders BEFORE any JS/network, prevents white-screen flash on PWA launch -->
    <style>
      #app-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #F7F4EB;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.25s ease;
      }
      #app-splash .splash-sub { color: #8FAF7E; }
      @media (prefers-color-scheme: dark) {
        #app-splash { background: #1E2E1E; }
        #app-splash .splash-title { color: #D4EDBC; }
        #app-splash .splash-sub   { color: #6B9A5E; }
        #app-splash .splash-icon-bg  { fill: #D4EDBC; }
        #app-splash .splash-icon-fg  { fill: #1E2E1E; }
      }
    </style>

    <!-- SVG favicon (現代瀏覽器，支援深色模式自動切換) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PNG favicon fallback -->
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/favicon-48-light.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32-light.png" />

    <!-- Apple Touch Icon (180×180 — exact size for modern iPhone; solid bg for home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />

    <!-- iOS Splash Screens (apple-touch-startup-image)
         Image size = CSS logical px × device-pixel-ratio
         Prevents white-screen flash when launching from home screen
    -->
    <!-- iPhone 16 Pro Max  440×956 @3× -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-16promax.png"
      media="screen and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 16 Pro  402×874 @3× -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-16pro.png"
      media="screen and (device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 15 Pro Max / 14 Pro Max  430×932 @3× -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-15promax.png"
      media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 15 Pro / 14 Pro  393×852 @3× -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-15pro.png"
      media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 15 Plus / 14 Plus / 13 Pro Max / 12 Pro Max  428×926 @3× -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-15plus.png"
      media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone 15 / 14 / 13 Pro / 13 / 12 Pro / 12  390×844 @3× -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-15.png"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone X / XS / 11 Pro / 13 mini / 12 mini  375×812 @3× -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-x.png"
      media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone XS Max / 11 Pro Max  414×896 @3× -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-xsmax.png"
      media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone XR / 11  414×896 @2× -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-xr.png"
      media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- iPhone 8 Plus / 7 Plus  414×736 @3× -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-8plus.png"
      media="screen and (device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <!-- iPhone SE 2nd/3rd / 8 / 7 / 6  375×667 @2× -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-se.png"
      media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- iPhone SE 1st gen  320×568 @2× -->
    <link rel="apple-touch-startup-image" href="/splash/iphone-se1.png"
      media="screen and (device-width: 320px) and (device-height: 568px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- iPad Pro 12.9"  1024×1366 @2× -->
    <link rel="apple-touch-startup-image" href="/splash/ipad-pro-129.png"
      media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- iPad Pro 11"  834×1194 @2× -->
    <link rel="apple-touch-startup-image" href="/splash/ipad-pro-11.png"
      media="screen and (device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- iPad Air 5th / iPad 10th  820×1180 @2× -->
    <link rel="apple-touch-startup-image" href="/splash/ipad-air.png"
      media="screen and (device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- iPad mini 6th  744×1133 @2× -->
    <link rel="apple-touch-startup-image" href="/splash/ipad-mini6.png"
      media="screen and (device-width: 744px) and (device-height: 1133px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- iPad 9th gen / Air 2  768×1024 @2× -->
    <link rel="apple-touch-startup-image" href="/splash/ipad-9th.png"
      media="screen and (device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
  </head>
  <body>
    <!-- Inline splash screen: shown before React mounts, removed by main.tsx -->
    <div id="app-splash" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="80" height="80"
           style="border-radius:18px;margin-bottom:18px;box-shadow:0 4px 24px rgba(58,90,58,0.18)">
        <rect class="splash-icon-bg" width="48" height="48" rx="10" fill="#3A5A3A"/>
        <text class="splash-icon-fg" fill="#F7F4EB" x="24" y="28"
              font-family="Georgia,serif" font-size="20" font-weight="700"
              text-anchor="middle" letter-spacing="-1">TM</text>
      </svg>
      <span class="splash-title"
            style="font-family:Georgia,serif;font-size:20px;font-weight:700;color:#3A5A3A;letter-spacing:-0.3px">
        TripMori
      </span>
      <span class="splash-sub"
            style="font-family:sans-serif;font-size:13px;margin-top:5px">
        旅行手帳
      </span>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
