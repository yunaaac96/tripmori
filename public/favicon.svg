<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <style>
    .bg  { fill: #F7F4EB; }
    .fg  { fill: #3A5A3A; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #3A5A3A; }
      .fg { fill: #F7F4EB; }
    }
  </style>
  <!-- Rounded square background -->
  <rect class="bg" x="0" y="0" width="48" height="48" rx="10" ry="10"/>
  <!-- "T" lettermark -->
  <text class="fg" x="50%" y="58%" font-family="Georgia, serif" font-size="28" font-weight="700"
        text-anchor="middle" dominant-baseline="middle">T</text>
</svg>
